<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Travel Finance OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="bg"></div>

<div class="app">
    <div class="sidebar">
        <div class="logo">✈ Travel OS</div>
        <div class="nav-links">
            <div class="nav-item">Dashboard</div>
            <div class="nav-item">Gastos</div>
            <div class="nav-item">Relatórios</div>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div>
                <div class="title">Dashboard Financeiro</div>
                <div class="subtitle">Controle inteligente da sua viagem</div>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Orçamento</h3>
                <p>R$ 5.000</p>
            </div>
            <div class="card">
                <h3>Gasto</h3>
                <p id="gasto">R$ 0</p>
            </div>
            <div class="card">
                <h3>Saldo</h3>
                <p id="saldo">R$ 5.000</p>
            </div>
        </div>

        <div class="grid">
            <div class="panel h-fit">
                <h3>Novo gasto</h3>
                <br>
                <form id="form">
                    <input id="desc" placeholder="Descrição" required>
                    <input id="val" type="number" step="0.01" placeholder="Valor" required>
                    <button type="submit">Adicionar</button>
                </form>
            </div>

            <div class="panel overflow-container">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Valor</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="list"></tbody>
                </table>
                <div id="empty" class="empty">Nada ainda…</div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
