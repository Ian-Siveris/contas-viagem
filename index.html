<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Planejamento de Viagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Planejamento de Viagem</h1>
        </header>

        <section class="resumo">
            <div class="card">
                <h2>Orçamento Total</h2>
                <p id="valor-orcamento">R$ 5.000,00</p>
            </div>
            <div class="card">
                <h2>Total Gasto</h2>
                <p id="valor-gasto" class="texto-vermelho">R$ 0,00</p>
            </div>
            <div class="card">
                <h2>Saldo Restante</h2>
                <p id="valor-saldo" class="texto-verde">R$ 5.000,00</p>
            </div>
        </section>

        <div class="layout-principal">
            <aside class="painel">
                <h2>Novo Gasto</h2>
                <form id="form-gasto">
                    <div class="grupo-input">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Uber, Jantar..." required>
                    </div>
                    <div class="grupo-input">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0.00" required>
                    </div>
                    <button type="submit">Adicionar</button>
                </form>
            </aside>

            <main class="painel">
                <h2>Planilha de Custos</h2>
                <div class="tabela-container">
                    <table id="tabela-gastos">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th class="alinhar-direita">Valor</th>
                                <th class="alinhar-centro">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-gastos">
                            </tbody>
                    </table>
                    <div id="mensagem-vazia" class="mensagem-vazia">
                        Sua planilha está vazia. Adicione um gasto para começar!
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
