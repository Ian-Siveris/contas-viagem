<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> ✈ Custos de Viagem</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   BASE
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    color: #e5e7eb;
    overflow-x: hidden;
    background: #070A12;
}

/* =========================
   ANIMATED BACKGROUND
========================= */
.bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(99,102,241,0.25), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(236,72,153,0.20), transparent 40%),
      radial-gradient(circle at 40% 80%, rgba(34,211,238,0.15), transparent 40%);
    filter: blur(40px);
    z-index: -1;
    animation: move 12s ease-in-out infinite alternate;
}

@keyframes move {
    from { transform: translateY(-10px) scale(1); }
    to { transform: translateY(10px) scale(1.05); }
}

/* =========================
   APP LAYOUT
========================= */
.app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
    background: rgba(255,255,255,0.03);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 20px;
    backdrop-filter: blur(20px);
}

.logo {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 30px;
}

.nav-item {
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    color: #9ca3af;
    cursor: pointer;
    transition: .2s;
}

.nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: white;
}

/* =========================
   MAIN
========================= */
.main {
    padding: 24px;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.title {
    font-size: 22px;
    font-weight: 700;
}

.subtitle {
    font-size: 12px;
    color: #9ca3af;
}

/* =========================
   CARDS
========================= */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    transition: .25s;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top left, rgba(99,102,241,0.3), transparent 50%);
    opacity: 0;
    transition: .3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: rgba(99,102,241,0.4);
}

.card:hover::before {
    opacity: 1;
}

.card h3 {
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 8px;
}

.card p {
    font-size: 24px;
    font-weight: 700;
}

/* =========================
   GRID CONTENT
========================= */
.grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
}

.panel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(20px);
}

/* =========================
   FORM
========================= */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.2);
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg,#6366f1,#ec4899);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: .2s;
}

button:hover {
    transform: scale(1.03);
}

/* =========================
   TABLE
========================= */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    font-size: 11px;
    color: #9ca3af;
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

tr:hover {
    background: rgba(255,255,255,0.03);
}

.delete {
    color: #9ca3af;
    cursor: pointer;
}

.delete:hover {
    color: #fb7185;
}

.empty {
    padding: 20px;
    text-align: center;
    color: #6b7280;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<div class="sidebar">
    <div class="logo">✈ Custos de Viagem</div>
    <div class="nav-item">Dashboard</div>
</div>

<div class="main">

    <div class="topbar">
        <div>
            <div class="title">Dashboard Financeiro</div>
            <div class="subtitle">Controle inteligente da sua viagem</div>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Orçamento</h3>
            <p>R$ 5.000</p>
        </div>

        <div class="card">
            <h3>Gasto</h3>
            <p id="gasto">R$ 0</p>
        </div>

        <div class="card">
            <h3>Saldo</h3>
            <p id="saldo">R$ 5.000</p>
        </div>
    </div>

    <div class="grid">

        <div class="panel">
            <h3>Novo gasto</h3>
            <br>
            <form id="form">
                <input id="desc" placeholder="Descrição" required>
                <input id="val" type="number" step="0.01" placeholder="Valor" required>
                <button type="submit">Adicionar</button>
            </form>
        </div>

        <div class="panel">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
            <div id="empty" class="empty">Nada ainda…</div>
        </div>

    </div>

</div>
</div>

<script>
// O NOME CORRIGIDO: clienteSupabase
const clienteSupabase = window.supabase.createClient(
    "https://fqgabqwyvutmocibybzd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxZ2FicXd5dnV0bW9jaWJ5YnpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTkxODAsImV4cCI6MjA5NDk3NTE4MH0.MRQyIIUw7LAZFtzq6-yPS2lLB72F5a75eQtaYjujrSw"
);

let gastos = [];
const ORC = 5000;

const f = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);

function render(){
    let total = gastos.reduce((a,b)=>a+Number(b.valor),0);

    document.getElementById("gasto").innerText = f(total);
    document.getElementById("saldo").innerText = f(ORC-total);

    const list = document.getElementById("list");
    const empty = document.getElementById("empty");

    list.innerHTML = "";

    empty.style.display = gastos.length ? "none" : "block";

    gastos.forEach(g=>{
        list.innerHTML += `
        <tr>
            <td>${g.data}</td>
            <td>${g.descricao}</td>
            <td>${f(g.valor)}</td>
            <td><span class="delete" onclick="del('${g.id}')">✕</span></td>
        </tr>`;
    });
}

async function load(){
    const {data} = await clienteSupabase.from("gastos").select("*").order('created_at', { ascending: false });
    gastos = data || [];
    render();
}

document.getElementById("form").addEventListener("submit", async e=>{
    e.preventDefault();

    const descInput = document.getElementById("desc");
    const valInput = document.getElementById("val");
    
    const descricao = descInput.value.trim();
    const valor = parseFloat(valInput.value);

    if (!descricao || isNaN(valor)) return;

    const btn = e.target.querySelector("button");
    btn.innerText = "Salvando...";
    btn.disabled = true;

    const {data, error} = await clienteSupabase.from("gastos")
    .insert([{
        descricao: descricao, 
        valor: valor, 
        data: new Date().toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'})
    }])
    .select();

    if (error) {
        console.error(error);
        alert("Erro ao salvar! Verifique se desativou o RLS no Supabase.");
    } else if (data) {
        gastos.unshift(data[0]);
        render();
        descInput.value = "";
        valInput.value = "";
        descInput.focus();
    }

    btn.innerText = "Adicionar";
    btn.disabled = false;
});

window.del = async (id)=>{
    if(!confirm("Tem certeza que deseja apagar?")) return;
    
    await clienteSupabase.from("gastos").delete().eq("id", id);
    gastos = gastos.filter(g=>g.id != id);
    render();
}

load();
</script>

</body>
</html>
