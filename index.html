<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Planejamento de Viagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-fundo: #111827; 
            --bg-card: #1f2937;  
            --borda: #374151;    
            --texto-primario: #f3f4f6; 
            --texto-secundario: #9ca3af; 
            --azul: #2563eb;
            --azul-hover: #3b82f6;
            --vermelho: #f43f5e;
            --verde: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-fundo);
            color: var(--texto-primario);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #fff;
        }

        /* Cards de Resumo */
        .resumo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 0.875rem;
            color: var(--texto-secundario);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .card p {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .texto-vermelho { color: var(--vermelho) !important; }
        .texto-verde { color: var(--verde) !important; }

        /* Layout Grid */
        .layout-principal {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .layout-principal {
                grid-template-columns: 1fr;
            }
        }

        .painel {
            background-color: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: 0.75rem;
            padding: 1.5rem;
            height: fit-content;
        }

        .painel h2 {
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
        }

        /* Formulário */
        .grupo-input {
            margin-bottom: 1rem;
        }

        .grupo-input label {
            display: block;
            font-size: 0.875rem;
            color: var(--texto-secundario);
            margin-bottom: 0.5rem;
        }

        .grupo-input input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-fundo);
            border: 1px solid var(--borda);
            border-radius: 0.5rem;
            color: #fff;
            outline: none;
        }

        .grupo-input input:focus {
            border-color: var(--azul);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--azul);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--azul-hover);
        }

        /* Tabela */
        .tabela-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--borda);
        }

        th {
            color: var(--texto-secundario);
            font-size: 0.875rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        td {
            font-size: 0.95rem;
        }

        .alinhar-direita { text-align: right; }
        .alinhar-centro { text-align: center; }

        .btn-remover {
            background: none;
            color: var(--texto-secundario);
            padding: 0.25rem 0.5rem;
            font-size: 1.2rem;
            width: auto;
        }

        .btn-remover:hover {
            color: var(--vermelho);
            background: transparent;
        }

        .mensagem-vazia {
            text-align: center;
            padding: 3rem;
            color: var(--texto-secundario);
            border: 1px dashed var(--borda);
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Planejamento de Viagem</h1>
        </header>

        <section class="resumo">
            <div class="card">
                <h2>Orçamento Total</h2>
                <p id="valor-orcamento">R$ 5.000,00</p>
            </div>
            <div class="card">
                <h2>Total Gasto</h2>
                <p id="valor-gasto" class="texto-vermelho">R$ 0,00</p>
            </div>
            <div class="card">
                <h2>Saldo Restante</h2>
                <p id="valor-saldo" class="texto-verde">R$ 5.000,00</p>
            </div>
        </section>

        <div class="layout-principal">
            <aside class="painel">
                <h2>Novo Gasto</h2>
                <form id="form-gasto">
                    <div class="grupo-input">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Uber, Jantar..." required>
                    </div>
                    <div class="grupo-input">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0.00" required>
                    </div>
                    <button type="submit">Adicionar</button>
                </form>
            </aside>

            <main class="painel">
                <h2>Planilha de Custos</h2>
                <div class="tabela-container">
                    <table id="tabela-gastos">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th class="alinhar-direita">Valor</th>
                                <th class="alinhar-centro">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-gastos">
                            </tbody>
                    </table>
                    <div id="mensagem-vazia" class="mensagem-vazia">
                        Sua planilha está vazia. Adicione um gasto para começar!
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const ORCAMENTO_TOTAL = 5000;
        let gastos = [];

        const form = document.getElementById('form-gasto');
        const inputDescricao = document.getElementById('descricao');
        const inputValor = document.getElementById('valor');
        const listaGastos = document.getElementById('lista-gastos');
        const mensagemVazia = document.getElementById('mensagem-vazia');
        const tabelaGastos = document.getElementById('tabela-gastos');

        const valorGasto = document.getElementById('valor-gasto');
        const valorSaldo = document.getElementById('valor-saldo');

        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        };

        const obterDataAtual = () => {
            const data = new Date();
            return `${data.getDate().toString().padStart(2, '0')}/${(data.getMonth() + 1).toString().padStart(2, '0')}`;
        };

        const atualizarResumo = () => {
            const total = gastos.reduce((acc, gasto) => acc + gasto.valor, 0);
            const saldo = ORCAMENTO_TOTAL - total;

            valorGasto.innerText = formatarMoeda(total);
            valorSaldo.innerText = formatarMoeda(saldo);

            if (saldo < 0) {
                valorSaldo.classList.remove('texto-verde');
                valorSaldo.classList.add('texto-vermelho');
            } else {
                valorSaldo.classList.remove('texto-vermelho');
                valorSaldo.classList.add('texto-verde');
            }
        };

        const renderizarTabela = () => {
            listaGastos.innerHTML = '';

            if (gastos.length === 0) {
                mensagemVazia.style.display = 'block';
                tabelaGastos.style.display = 'none';
            } else {
                mensagemVazia.style.display = 'none';
                tabelaGastos.style.display = 'table';

                gastos.forEach(gasto => {
                    const tr = document.createElement('tr');
                    
                    tr.innerHTML = `
                        <td style="color: var(--texto-secundario)">${gasto.data}</td>
                        <td style="font-weight: 500">${gasto.descricao}</td>
                        <td class="alinhar-direita texto-vermelho font-semibold">${formatarMoeda(gasto.valor)}</td>
                        <td class="alinhar-centro">
                            <button class="btn-remover" onclick="removerGasto(${gasto.id})" title="Excluir">✕</button>
                        </td>
                    `;
                    
                    listaGastos.appendChild(tr);
                });
            }

            atualizarResumo();
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const descricao = inputDescricao.value.trim();
            const valor = parseFloat(inputValor.value);

            if (descricao === '' || isNaN(valor)) return;

            const novoGasto = {
                id: Date.now(),
                data: obterDataAtual(),
                descricao: descricao,
                valor: valor
            };

            gastos.unshift(novoGasto); 
            salvarNoLocalStorage();
            renderizarTabela();

            inputDescricao.value = '';
            inputValor.value = '';
            inputDescricao.focus();
        });

        window.removerGasto = (id) => {
            gastos = gastos.filter(gasto => gasto.id !== id);
            salvarNoLocalStorage();
            renderizarTabela();
        };

        const salvarNoLocalStorage = () => {
            localStorage.setItem('gastosVanilla', JSON.stringify(gastos));
        };

        const carregarDoLocalStorage = () => {
            const dados = localStorage.getItem('gastosVanilla');
            if (dados) {
                gastos = JSON.parse(dados);
            }
            renderizarTabela();
        };

        carregarDoLocalStorage();
    </script>
</body>
</html>
