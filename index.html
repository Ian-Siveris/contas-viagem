<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Planeamento de Viagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-fundo: #111827; 
            --bg-card: #1f2937;  
            --borda: #374151;    
            --texto-primario: #f3f4f6; 
            --texto-secundario: #9ca3af; 
            --azul: #2563eb;
            --azul-hover: #3b82f6;
            --vermelho: #f43f5e;
            --verde: #34d399;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-fundo); color: var(--texto-primario); padding: 2rem 1rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        header h1 { font-size: 1.8rem; margin-bottom: 2rem; color: #fff; display: flex; align-items: center; gap: 10px; }

        .resumo { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background-color: var(--bg-card); border: 1px solid var(--borda); border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
        .card h2 { font-size: 0.875rem; color: var(--texto-secundario); font-weight: 500; margin-bottom: 0.5rem; }
        .card p { font-size: 1.5rem; font-weight: 700; }
        .texto-vermelho { color: var(--vermelho) !important; }
        .texto-verde { color: var(--verde) !important; }

        .layout-principal { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        @media (max-width: 768px) { .layout-principal { grid-template-columns: 1fr; } }
        .painel { background-color: var(--bg-card); border: 1px solid var(--borda); border-radius: 0.75rem; padding: 1.5rem; height: fit-content; }
        .painel h2 { font-size: 1.125rem; margin-bottom: 1.5rem; color: #fff; }

        .grupo-input { margin-bottom: 1rem; }
        .grupo-input label { display: block; font-size: 0.875rem; color: var(--texto-secundario); margin-bottom: 0.5rem; }
        .grupo-input input { width: 100%; padding: 0.75rem; background-color: var(--bg-fundo); border: 1px solid var(--borda); border-radius: 0.5rem; color: #fff; outline: none; }
        .grupo-input input:focus { border-color: var(--azul); }
        
        button { width: 100%; padding: 0.75rem; background-color: var(--azul); color: #fff; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: var(--azul-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .tabela-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--borda); }
        th { color: var(--texto-secundario); font-size: 0.875rem; text-transform: uppercase; font-weight: 500; }
        td { font-size: 0.95rem; }
        .alinhar-direita { text-align: right; }
        .alinhar-centro { text-align: center; }

        .btn-remover { background: none; color: var(--texto-secundario); padding: 0.25rem 0.5rem; font-size: 1.2rem; width: auto; cursor: pointer; border: none; }
        .btn-remover:hover { color: var(--vermelho); background: transparent; }
        
        .mensagem-vazia { text-align: center; padding: 3rem; color: var(--texto-secundario); border: 1px dashed var(--borda); border-radius: 0.5rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Planeamento de Viagem</h1>
        </header>

        <section class="resumo">
            <div class="card">
                <h2>Orçamento Total</h2>
                <p id="valor-orcamento">R$ 5.000,00</p>
            </div>
            <div class="card">
                <h2>Total Gasto</h2>
                <p id="valor-gasto" class="texto-vermelho">R$ 0,00</p>
            </div>
            <div class="card">
                <h2>Saldo Restante</h2>
                <p id="valor-saldo" class="texto-verde">R$ 5.000,00</p>
            </div>
        </section>

        <div class="layout-principal">
            <aside class="painel">
                <h2>Novo Gasto</h2>
                <form id="form-gasto">
                    <div class="grupo-input">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Uber, Jantar..." required>
                    </div>
                    <div class="grupo-input">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0.00" required>
                    </div>
                    <button type="submit" id="btn-salvar">Adicionar</button>
                </form>
            </aside>

            <main class="painel">
                <h2>Planilha de Custos <span id="status-carregando" style="font-size: 0.8rem; color: var(--azul); display: none;">(A sincronizar...)</span></h2>
                <div class="tabela-container">
                    <table id="tabela-gastos">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th class="alinhar-direita">Valor</th>
                                <th class="alinhar-centro">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-gastos">
                            </tbody>
                    </table>
                    <div id="mensagem-vazia" class="mensagem-vazia">
                        Nenhum gasto encontrado na nuvem. Adicione um para começar!
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO DO SUPABASE (COLE AQUI!)
        // ==========================================
        const supabaseUrl = 'https://fqgabqwyvutmocibybzd.supabase.co/rest/v1/'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxZ2FicXd5dnV0bW9jaWJ5YnpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTkxODAsImV4cCI6MjA5NDk3NTE4MH0.MRQyIIUw7LAZFtzq6-yPS2lLB72F5a75eQtaYjujrSw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // 2. LÓGICA DA APLICAÇÃO
        // ==========================================
        const ORCAMENTO_TOTAL = 5000;
        let gastos = [];

        const form = document.getElementById('form-gasto');
        const btnSalvar = document.getElementById('btn-salvar');
        const statusCarregando = document.getElementById('status-carregando');
        
        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        };

        const obterDataAtual = () => {
            const data = new Date();
            return `${data.getDate().toString().padStart(2, '0')}/${(data.getMonth() + 1).toString().padStart(2, '0')}`;
        };

        const atualizarResumo = () => {
            const total = gastos.reduce((acc, gasto) => acc + Number(gasto.valor), 0);
            const saldo = ORCAMENTO_TOTAL - total;

            document.getElementById('valor-gasto').innerText = formatarMoeda(total);
            const valorSaldo = document.getElementById('valor-saldo');
            valorSaldo.innerText = formatarMoeda(saldo);

            if (saldo < 0) {
                valorSaldo.classList.remove('texto-verde');
                valorSaldo.classList.add('texto-vermelho');
            } else {
                valorSaldo.classList.remove('texto-vermelho');
                valorSaldo.classList.add('texto-verde');
            }
        };

        const renderizarTabela = () => {
            const listaGastos = document.getElementById('lista-gastos');
            const mensagemVazia = document.getElementById('mensagem-vazia');
            const tabelaGastos = document.getElementById('tabela-gastos');

            listaGastos.innerHTML = '';

            if (gastos.length === 0) {
                mensagemVazia.style.display = 'block';
                tabelaGastos.style.display = 'none';
            } else {
                mensagemVazia.style.display = 'none';
                tabelaGastos.style.display = 'table';

                gastos.forEach(gasto => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: var(--texto-secundario)">${gasto.data}</td>
                        <td style="font-weight: 500; color: #fff;">${gasto.descricao}</td>
                        <td class="alinhar-direita texto-vermelho font-semibold">${formatarMoeda(gasto.valor)}</td>
                        <td class="alinhar-centro">
                            <button class="btn-remover" onclick="removerGasto('${gasto.id}')" title="Apagar">✕</button>
                        </td>
                    `;
                    listaGastos.appendChild(tr);
                });
            }
            atualizarResumo();
        };

        // ==========================================
        // 3. INTEGRAÇÃO COM A BASE DE DADOS
        // ==========================================

        async function carregarGastos() {
            statusCarregando.style.display = 'inline';
            const { data, error } = await supabase
                .from('gastos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erro ao carregar:', error);
                alert('Erro ao carregar dados. Verifique a URL e Chave do Supabase.');
            } else {
                gastos = data;
                renderizarTabela();
            }
            statusCarregando.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSalvar.disabled = true;
            btnSalvar.innerText = 'A guardar...';

            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);

            const novoGasto = {
                data: obterDataAtual(),
                descricao: descricao,
                valor: valor
            };

            const { data, error } = await supabase
                .from('gastos')
                .insert([novoGasto])
                .select();

            if (error) {
                console.error('Erro ao guardar:', error);
                alert('Erro ao guardar na base de dados!');
            } else {
                gastos.unshift(data[0]); 
                renderizarTabela();
                
                document.getElementById('descricao').value = '';
                document.getElementById('valor').value = '';
                document.getElementById('descricao').focus();
            }

            btnSalvar.disabled = false;
            btnSalvar.innerText = 'Adicionar';
        });

        window.removerGasto = async (id) => {
            if(!confirm('Tem a certeza que deseja apagar?')) return;
            
            statusCarregando.style.display = 'inline';
            const { error } = await supabase
                .from('gastos')
                .delete()
                .eq('id', id);

            if (error) {
                console.error('Erro ao apagar:', error);
                alert('Erro ao apagar!');
            } else {
                gastos = gastos.filter(gasto => String(gasto.id) !== String(id));
                renderizarTabela();
            }
            statusCarregando.style.display = 'none';
        };

        // Inicia a aplicação puxando os dados do Supabase
        carregarGastos();
    </script>
</body>
</html>
